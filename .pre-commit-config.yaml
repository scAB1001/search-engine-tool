exclude: '^data/.*'
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: name-tests-test
        args: [--pytest-test-first]
      - id: check-added-large-files
      - id: debug-statements
      - id: check-ast
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-yaml
      - id: check-toml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        name: Ruff Python Linting
        description: This hook checks and formats extremely fast Python linting.
        types_or: [python, pyi]
        args: [--fix, --exit-non-zero-on-fix]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        name: mypy mirror for Python Static Type Checking
        description: This hook calls the mirror of mypy, the static type checker for Python.
        additional_dependencies:
          - "types-requests"
          - "beautifulsoup4"
          - "typer"
        args: [
          --strict,
          --ignore-missing-imports,
          --scripts-are-modules,
          --check-untyped-defs,
          --warn-redundant-casts,
          --warn-unused-ignores,
          --warn-no-return,
          --no-implicit-optional
        ]
        require_serial: true
        exclude: ^tests/

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.11
    hooks:
      - id: actionlint
        name: Check Syntax for Workflow File
        description: This hooks checks the syntax for workflow files.
        args: [
          -ignore=property "debug_build" is not defined,
          -ignore=property "allow_failure" is not defined,
          -ignore=SC2(046|086),
        ]
        additional_dependencies:
          - "github.com/wasilibs/go-shellcheck/cmd/shellcheck@v0.11.1"
